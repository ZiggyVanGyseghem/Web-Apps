<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Tracker | Camera Scanner</title>
    <meta name="description" content="Scan barcodes to add items to your watchlist.">
    <meta name="theme-color" content="#8a2be2">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script type="module" src="app.js"></script>
</head>

<body>
    <header class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-play"></i>
                <span>AnimeTrack</span>
            </a>
            <nav class="main-nav">
                <a href="index.html"><i class="fas fa-home"></i> <span>Home</span></a>
                <a href="library.html"><i class="fas fa-book-open"></i> <span>My Library</span></a>
                <a href="camera.html" class="active"><i class="fas fa-camera"></i> <span>Scanner</span></a>
                <a href="browse.html"><i class="fas fa-compass"></i> <span>Browse</span></a>
                <a href="profile.html"><i class="fas fa-user"></i> <span>Profile</span></a>
            </nav>
            <button class="menu-toggle" aria-label="Toggle menu">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </header>

    <main class="container main-content" style="padding-top: 1rem;">
        <div class="scanner-container">
            <section class="hero"
                style="margin-top: 0; padding: 2.5rem 1.5rem; background: none; border: none; backdrop-filter: none;">
                <h1>Smart <span class="highlight">Scanner</span></h1>
                <p>Scan any manga or book barcode to instantly add it to your collection.</p>

                <div style="margin: 1rem 0; display: flex; justify-content: center; gap: 1rem;">
                    <button class="btn btn-primary" id="startButton">
                        <i class="fas fa-camera"></i> Start Scanning
                    </button>
                    <button class="btn" id="stopButton"
                        style="background: var(--glass-bg); border: 1px solid var(--glass-border);">
                        <i class="fas fa-stop"></i> Stop
                    </button>
                </div>

                <div id="errorMessage" style="color: #ff4d4d; margin-top: 10px; font-weight: 600;"></div>
            </section>

            <div id="reader-wrapper" style="position: relative; max-width: 700px; margin: 0 auto;">
                <div id="reader"></div>
                <!-- Immersive Scanner Overlay -->
                <div id="scanner-overlay"
                    style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10;">
                    <div
                        style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; height: 60%; border: 2px solid var(--accent-secondary); border-radius: 20px; box-shadow: 0 0 0 2000px rgba(0,0,0,0.5);">
                        <div
                            style="position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: var(--accent-secondary); box-shadow: 0 0 15px var(--accent-secondary); animation: scan-line 2s ease-in-out infinite;">
                        </div>
                    </div>
                </div>
            </div>

            <div
                style="background: var(--panel-bg); backdrop-filter: blur(10px); padding: 2rem; border-radius: 24px; border: 1px solid var(--glass-border); margin: 2rem auto; max-width: 700px; box-shadow: var(--shadow-lg);">
                <div
                    style="display: flex; align-items: center; justify-content: center; gap: 1rem; margin-bottom: 1rem;">
                    <span
                        style="color: var(--text-secondary); font-size: 0.9rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;">Live
                        Result</span>
                    <div style="height: 1px; flex-grow: 1; background: var(--glass-border);"></div>
                </div>
                <span id="scanResult"
                    style="color: var(--accent-secondary); font-family: monospace; font-size: 1.5rem; font-weight: 800; display: block; margin-bottom: 1rem;">Waiting
                    for scan...</span>
                <div id="bookDetails"></div>
            </div>

            <!-- SERIES CONFIRMATION MODAL -->
            <div id="seriesModal"
                style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 2000; align-items: center; justify-content: center; padding: 1.5rem;">
                <div class="auth-container" style="margin: 0; width: 100%; max-width: 450px;">
                    <h2 style="margin-bottom: 0.5rem;">Save to Library</h2>
                    <p style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 2rem;">Confirm the details
                        before adding.</p>

                    <div class="form-group">
                        <label>Series Name</label>
                        <input type="text" id="modalSeriesName" placeholder="e.g. Naruto">
                    </div>

                    <div class="form-group">
                        <label>Item Type</label>
                        <select id="modalItemType"
                            style="width: 100%; padding: 1rem; border-radius: 12px; background: rgba(255,255,255,0.05); color: white; border: 1px solid var(--glass-border); font-family: inherit;">
                            <option value="manga">Manga</option>
                            <option value="novel">Light Novel</option>
                            <option value="book">Standard Book</option>
                            <option value="anime">Anime DVD/Blu-ray</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Scanned Volume</label>
                        <input type="text" id="modalVolumeName" style="opacity: 0.7;" disabled>
                    </div>

                    <div style="margin-top: 2rem; display: flex; gap: 1rem;">
                        <button id="modalSaveBtn" class="btn btn-primary" style="flex: 2;">
                            <i class="fas fa-plus"></i> Add to Library
                        </button>
                        <button id="modalCancelBtn" class="btn"
                            style="flex: 1; background: var(--glass-bg);">Cancel</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <style>
        @keyframes scan-line {
            0% {
                top: 0;
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                top: 100%;
                opacity: 0;
            }
        }
    </style>

    <script>
        const startBtn = document.getElementById('startButton');
        const stopBtn = document.getElementById('stopButton');
        const errorDisplay = document.getElementById('errorMessage');
        const scanResult = document.getElementById('scanResult');
        const bookDetails = document.getElementById('bookDetails');
        const scannerOverlay = document.getElementById('scanner-overlay');

        // Modal Elements
        const seriesModal = document.getElementById('seriesModal');
        const modalSeriesName = document.getElementById('modalSeriesName');
        const modalItemType = document.getElementById('modalItemType');
        const modalVolumeName = document.getElementById('modalVolumeName');
        const modalSaveBtn = document.getElementById('modalSaveBtn');
        const modalCancelBtn = document.getElementById('modalCancelBtn');

        let html5QrCode = null;
        let lastScannedCode = null;
        let currentScannedItem = null;

        // Audio Beep for iOS/Samsung cross-compatibility
        function playBeep() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(800, audioCtx.currentTime); // 800Hz beep
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime); // 10% volume

                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.15); // play for 150ms
            } catch (e) { console.log('Audio error:', e); }
        }

        function guessSeriesName(title) {
            let guess = title.split(/Vol|Volume|Book|Part|Chapter|Issue|#|-/i)[0].trim();
            if (guess.length === 0) guess = title;
            return guess;
        }

        startBtn.addEventListener('click', () => {
            errorDisplay.innerText = '';
            scanResult.innerText = "Scanning...";
            bookDetails.innerHTML = '';
            lastScannedCode = null;

            if (!html5QrCode) {
                html5QrCode = new Html5Qrcode("reader");
            }

            scannerOverlay.style.display = "block";

            html5QrCode.start(
                { facingMode: "environment" },
                {
                    fps: 10,
                    formatsToSupport: [
                        Html5QrcodeSupportedFormats.EAN_13,
                        Html5QrcodeSupportedFormats.EAN_8,
                        Html5QrcodeSupportedFormats.UPC_A,
                        Html5QrcodeSupportedFormats.UPC_E
                    ]
                },
                (decodedText, decodedResult) => {
                    if (lastScannedCode === decodedText) return;
                    lastScannedCode = decodedText;

                    scanResult.innerText = decodedText;

                    if ("vibrate" in navigator) navigator.vibrate(50);
                    playBeep();

                    bookDetails.innerHTML = `
                        <div style="display: flex; flex-direction: column; align-items: center; gap: 1rem; margin-top: 1rem;">
                            <div class="spinner" style="width: 30px; height: 30px; border: 3px solid var(--glass-border); border-top-color: var(--accent-secondary); border-radius: 50%; animation: spin 1s linear infinite;"></div>
                            <p style="color: var(--text-secondary);">Searching OpenLibrary Database...</p>
                        </div>
                    `;

                    fetch(`https://openlibrary.org/api/books?bibkeys=ISBN:${decodedText}&format=json&jscmd=data`)
                        .then(response => response.json())
                        .then(data => {
                            const bookKey = `ISBN:${decodedText}`;
                            if (data[bookKey]) {
                                const bookInfo = data[bookKey];
                                const title = bookInfo.title || 'Unknown Title';
                                const authors = bookInfo.authors ? bookInfo.authors.map(a => a.name).join(', ') : 'Unknown Author';
                                const cover = bookInfo.cover ? bookInfo.cover.medium : '';
                                const categories = bookInfo.subjects ? bookInfo.subjects[0].name : 'Category not listed';

                                let infoHtml = `
                                    <div style="margin-top: 2rem; padding-top: 2rem; border-top: 1px solid var(--glass-border); text-align: center;">
                                        <h3 style="font-size: 1.5rem; margin-bottom: 0.5rem;">${title}</h3>
                                        <p style="color: var(--text-secondary); margin-bottom: 0.5rem;">By ${authors}</p>
                                        <p style="font-size: 0.85rem; color: var(--accent-secondary); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2rem;">${categories}</p>
                                        <button class="btn btn-primary" id="addWatchlistBtn">
                                            <i class="fas fa-plus"></i> Add to Library
                                        </button>
                                    </div>
                                `;

                                if (cover) {
                                    infoHtml = `
                                        <div style="position: relative; display: inline-block; margin-bottom: 1.5rem;">
                                            <img src="${cover}" alt="Book Cover" style="max-height: 200px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid var(--glass-border);">
                                        </div>
                                    ` + infoHtml;
                                }

                                bookDetails.innerHTML = infoHtml;

                                document.getElementById('addWatchlistBtn').addEventListener('click', () => {
                                    if (html5QrCode.getState() === 2) html5QrCode.pause();

                                    currentScannedItem = {
                                        volumeId: decodedText,
                                        volumeTitle: title,
                                        author: authors,
                                        category: categories,
                                        cover: cover
                                    };

                                    modalSeriesName.value = guessSeriesName(title);
                                    modalVolumeName.value = title;
                                    seriesModal.style.display = "flex";
                                });
                            } else {
                                bookDetails.innerHTML = "<p style='color: #ffb703; font-weight: 600; margin-top: 1rem;'>No book found in OpenLibrary for this barcode.</p>";
                                lastScannedCode = null;
                            }
                        })
                        .catch(err => {
                            console.error("API Fetch Error:", err);
                            bookDetails.innerHTML = "<p style='color: #ff4d4d; font-weight: 600; margin-top: 1rem;'>Failed to connect to database.</p>";
                            lastScannedCode = null;
                        });
                },
                (errorMessage) => { }
            ).catch((err) => {
                console.error("Camera start failed:", err);
                errorDisplay.innerText = "Failed to start camera: " + err;
                scannerOverlay.style.display = "none";
            });
        });

        stopBtn.addEventListener('click', () => {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    scanResult.innerText = "Stopped.";
                    html5QrCode.clear();
                    html5QrCode = null;
                    lastScannedCode = null;
                    scannerOverlay.style.display = "none";
                }).catch((err) => {
                    console.error("Failed to stop camera:", err);
                });
            }
        });

        modalCancelBtn.addEventListener('click', () => {
            seriesModal.style.display = "none";
            if (html5QrCode && html5QrCode.getState() === 3) html5QrCode.resume();
        });

        modalSaveBtn.addEventListener('click', async () => {
            if (!currentScannedItem) return;

            modalSaveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
            modalSaveBtn.disabled = true;

            currentScannedItem.seriesName = modalSeriesName.value.trim() || currentScannedItem.volumeTitle;
            currentScannedItem.type = modalItemType.value;

            const saved = await window.saveToWatchlist(currentScannedItem);

            const btn = document.getElementById('addWatchlistBtn');
            if (saved) {
                btn.innerHTML = '<i class="fas fa-check"></i> Added!';
                btn.style.background = "linear-gradient(135deg, #00b894, #00cec9)";
            } else {
                btn.innerHTML = '<i class="fas fa-info-circle"></i> Already in Library';
                btn.style.background = "var(--glass-bg)";
            }

            seriesModal.style.display = "none";
            modalSaveBtn.innerHTML = '<i class="fas fa-plus"></i> Add to Library';
            modalSaveBtn.disabled = false;

            if (html5QrCode && html5QrCode.getState() === 3) html5QrCode.resume();
        });
    </script>
    <style>
        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }
    </style>
</body>

</html>
