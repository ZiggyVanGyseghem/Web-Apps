<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Anime Tracker | Browse</title>
    <meta name="description" content="Search for Manga and Anime to add to your library.">
    <meta name="theme-color" content="#8a2be2">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/images/logo.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script type="module" src="app.js"></script>
</head>

<body>
    <header class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-play"></i>
                <span>AnimeTrack</span>
            </a>
            <nav class="main-nav">
                <a href="index.html"><i class="fas fa-home"></i> <span>Home</span></a>
                <a href="library.html"><i class="fas fa-book-open"></i> <span>My Library</span></a>
                <a href="camera.html"><i class="fas fa-camera"></i> <span>Scanner</span></a>
                <a href="browse.html" class="active"><i class="fas fa-compass"></i> <span>Browse</span></a>
                <a href="profile.html"><i class="fas fa-user"></i> <span>Profile</span></a>
            </nav>
            <!-- PWA Install Button -->
            <button id="installBtn" class="menu-toggle" aria-label="Install as PWA" title="Install as PWA" style="display:none;background:var(--accent-gradient);border:none;">
                <i class="fas fa-download"></i>
            </button>
            <button id="burger-menu" class="menu-toggle" aria-label="Toggle menu">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </header>

    <main class="container main-content" style="padding-top: 2rem;">
        <section class="hero" style="margin-top: 1rem; padding: 2rem 1rem;">
            <h2><i class="fa-solid fa-compass highlight"></i> Discover New Series</h2>
            <p>Search the global MyAnimeList database for manga, novels, and anime.</p>
            
            <form id="search-form" style="display: flex; gap: 10px; margin-top: 1.5rem; flex-wrap: wrap;">
                <input type="text" id="search-query" placeholder="Type a title (e.g., Naruto)" required style="flex-grow: 1; padding: 0.8rem; border-radius: 6px; background: var(--glass-bg); color: white; border: 1px solid var(--glass-border);">
                <select id="search-type" style="padding: 0.8rem; border-radius: 6px; background: var(--glass-bg); color: white; border: 1px solid var(--glass-border);">
                    <option value="manga">Manga / Novel</option>
                    <option value="anime">Anime</option>
                </select>
                <button type="submit" class="btn btn-primary" id="search-btn"><i class="fa-solid fa-search"></i> Search</button>
            </form>
            <div id="search-error" style="color: #ff4d4d; margin-top: 10px; display: none;"></div>
        </section>

        <section class="watchlist" style="margin-bottom: 3rem;">
            <h2 id="results-title" style="display: none;">Search Results</h2>
            <div id="loading-spinner" style="display: none; text-align: center; padding: 2rem;">
                <div class="spinner" style="width: 40px; height: 40px; border: 4px solid var(--glass-border); border-top-color: var(--accent-primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto;"></div>
            </div>
            <div class="anime-grid" id="search-results-grid">
                <!-- Results populated by JS -->
            </div>
        </section>
    </main>

    <script>
        document.getElementById('search-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const query = document.getElementById('search-query').value.trim();
            const type = document.getElementById('search-type').value;
            const grid = document.getElementById('search-results-grid');
            const spinner = document.getElementById('loading-spinner');
            const errorDiv = document.getElementById('search-error');
            const resultsTitle = document.getElementById('results-title');
            const searchBtn = document.getElementById('search-btn');
            
            if (!query) return;

            grid.innerHTML = '';
            errorDiv.style.display = 'none';
            spinner.style.display = 'block';
            resultsTitle.style.display = 'none';
            searchBtn.disabled = true;

            try {
                // Using Jikan API v4
                const response = await fetch(`https://api.jikan.moe/v4/${type}?q=${encodeURIComponent(query)}&limit=10&sfw=true`);
                if (!response.ok) throw new Error('API Error');
                
                const data = await response.json();
                spinner.style.display = 'none';
                searchBtn.disabled = false;
                
                if (data.data && data.data.length > 0) {
                    resultsTitle.style.display = 'block';
                    
                    data.data.forEach(item => {
                        // Filter out Hentai
                        const isNSFW = item.genres && item.genres.some(g => g.name.toLowerCase() === 'hentai');
                        if (isNSFW) return;

                        const title = item.title;
                        const cover = item.images?.jpg?.image_url || '';
                        const synopsis = item.synopsis ? item.synopsis.substring(0, 100) + '...' : 'No description available.';
                        const score = item.score || 'N/A';
                        const url = item.url;
                        const malId = item.mal_id || '';
                        const episodes = item.episodes || item.chapters || '';
                        const status = item.status || '';
                        const broadcast = item.broadcast?.string || '';
                        
                        const card = document.createElement('div');
                        card.className = 'anime-card';
                        const bgStyle = cover ? `background-image: url('${cover}'); background-size: cover; background-position: center;` : `background: var(--accent-gradient)`;
                        
                        card.innerHTML = `
                            <div class="card-image" style="${bgStyle}">
                                <div class="status-badge" style="background: rgba(0,0,0,0.8);"><i class="fa-solid fa-star" style="color: gold;"></i> ${score}</div>
                            </div>
                            <div class="card-content">
                                <h3 class="card-title">${title}</h3>
                                <p class="card-episode" style="font-size: 0.8rem;">${synopsis}</p>
                                <button class="btn btn-primary add-to-lib-btn" style="width: 100%; margin-top: 10px; padding: 0.5rem;" data-title="${title}" data-type="${type}" data-cover="${cover}" data-episodes="${episodes}" data-status="${status}" data-broadcast="${broadcast}" data-mal-id="${malId}">
                                    <i class="fa-solid fa-plus"></i> Add Series
                                </button>
                            </div>
                        `;
                        grid.appendChild(card);
                    });

                    // Wire up Add buttons
                    document.querySelectorAll('.add-to-lib-btn').forEach(btn => {
                        btn.addEventListener('click', async (e) => {
                            const b = e.currentTarget;
                            b.disabled = true;
                            b.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Saving...';
                            
                            const item = {
                                seriesName: b.getAttribute('data-title'),
                                type: b.getAttribute('data-type'),
                                cover: b.getAttribute('data-cover'),
                                episodes: b.getAttribute('data-episodes'),
                                status: b.getAttribute('data-status'),
                                broadcast: b.getAttribute('data-broadcast'),
                                malId: b.getAttribute('data-mal-id'),
                                volumeId: 'api_' + Math.random().toString(36).substr(2, 9),
                                volumeTitle: 'Master Entry',
                                author: 'Jikan API',
                                category: 'API Import'
                            };
                            
                            if (window.saveToWatchlist) {
                                const saved = await window.saveToWatchlist(item);
                                if (saved) {
                                    b.style.background = '#28a745';
                                    b.innerHTML = '<i class="fa-solid fa-check"></i> Added!';
                                } else {
                                    b.style.background = '#6c757d';
                                    b.innerHTML = 'Already Saved';
                                }
                            } else {
                                b.style.background = '#ff4d4d';
                                b.innerHTML = 'Error: App Not Loaded';
                            }
                        });
                    });
                } else {
                    errorDiv.innerText = "No results found.";
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                console.error(err);
                spinner.style.display = 'none';
                searchBtn.disabled = false;
                errorDiv.innerText = "Failed to fetch from Jikan API. Please try again later.";
                errorDiv.style.display = 'block';
            }
        });
    </script>
    <style>
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</body>

</html>
