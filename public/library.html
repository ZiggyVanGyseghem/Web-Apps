<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Tracker | My Library</title>
    <meta name="description" content="View your scanned manga and books.">
    <meta name="theme-color" content="#8a2be2">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>

<body>
    <header class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-play"></i>
                <span>AnimeTrack</span>
            </a>
            <nav class="main-nav">
                <a href="index.html"><i class="fas fa-home"></i> <span>Home</span></a>
                <a href="library.html" class="active"><i class="fas fa-book-open"></i> <span>My Library</span></a>
                <a href="camera.html"><i class="fas fa-camera"></i> <span>Scanner</span></a>
                <a href="#"><i class="fas fa-compass"></i> <span>Browse</span></a>
                <a href="#"><i class="fas fa-user"></i> <span>Profile</span></a>
            </nav>
            <button class="menu-toggle" aria-label="Toggle menu">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </header>

    <main class="container main-content" style="padding-top: 2rem;">
        <section class="hero" style="margin-top: 1rem; padding: 2rem 1rem;">
            <h2><i class="fa-solid fa-book highlight"></i> My Reading Library</h2>
            <p>All your scanned books and manga in one place.</p>
        </section>

        <section class="watchlist" style="margin-bottom: 3rem;">
            <h2><i class="fa-solid fa-tv"></i> Saved Anime</h2>
            <div class="anime-grid" id="lib-anime-grid">
                <!-- Cards will be populated by JS -->
            </div>
        </section>

        <section class="watchlist" style="margin-bottom: 3rem;">
            <h2><i class="fa-solid fa-book"></i> Books & Manga</h2>
            <div class="anime-grid" id="lib-book-grid">
                <!-- Cards will be populated by JS -->
            </div>
        </section>

        <section class="watchlist" style="margin-bottom: 3rem;">
            <h2><i class="fa-solid fa-box-open"></i> Miscellaneous</h2>
            <div class="anime-grid" id="lib-misc-grid">
                <!-- Cards will be populated by JS -->
            </div>
        </section>
    </main>

    <script type="module" src="app.js"></script>
</body>

</html>
