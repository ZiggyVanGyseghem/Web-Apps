<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camera Test</title>
    <!-- Native unstyled layout for simple testing -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
</head>

<body>
    <h2>Simple Phone Camera Feed Test (html5-qrcode Scanner)</h2>
    <p>Click "Start Camera" and grant permissions. Point it at a Manga/Book barcode.</p>

    <div>
        <button id="startButton">Start Camera</button>
        <button id="stopButton">Stop Camera</button>
    </div>

    <div id="errorMessage" style="color: red; margin-top: 10px;"></div>

    <strong>Scanned ISBN/Barcode:</strong> <span id="scanResult" style="color: green; font-size: 1.2em;">Nothing
        yet...</span>

    <br>
    <!-- The html5-qrcode library will automatically inject the video feed here -->
    <div id="reader" style="width: 100%; max-width: 600px; margin-top: 15px;"></div>

    <script>
        const startBtn = document.getElementById('startButton');
        const stopBtn = document.getElementById('stopButton');
        const errorDisplay = document.getElementById('errorMessage');
        const scanResult = document.getElementById('scanResult');

        let html5QrCode = null;
        let nativeDetector = null;
        let nativeDetectTimer = null;

        function normalizeBarcode(input) {
            return String(input || '').replace(/\D/g, '');
        }

        function isValidIsbn13(code) {
            if (!/^97[89]\d{10}$/.test(code)) return false;
            let sum = 0;
            for (let i = 0; i < 12; i++) {
                const digit = parseInt(code[i], 10);
                sum += i % 2 === 0 ? digit : digit * 3;
            }
            const check = (10 - (sum % 10)) % 10;
            return check === parseInt(code[12], 10);
        }

        function stopNativeAssist() {
            if (nativeDetectTimer) {
                clearInterval(nativeDetectTimer);
                nativeDetectTimer = null;
            }
        }

        async function startNativeAssist(onDetected) {
            stopNativeAssist();
            if (!('BarcodeDetector' in window)) return;

            try {
                if (!nativeDetector) {
                    nativeDetector = new BarcodeDetector({ formats: ['ean_13', 'ean_8', 'upc_a', 'upc_e', 'code_128'] });
                }
            } catch (e) {
                return;
            }

            nativeDetectTimer = setInterval(async () => {
                const video = document.querySelector('#reader video');
                if (!video || video.readyState < 2) return;

                try {
                    const results = await nativeDetector.detect(video);
                    if (results && results.length > 0) {
                        onDetected(results[0].rawValue || '');
                    }
                } catch (e) {}
            }, 500);
        }

        function handleDetectedCode(decodedText) {
            const normalized = normalizeBarcode(decodedText);
            if (!isValidIsbn13(normalized)) {
                scanResult.innerText = 'Detected code is not a valid ISBN-13.';
                return;
            }

            scanResult.innerText = normalized;
            if ("vibrate" in navigator) navigator.vibrate(50);
        }

        startBtn.addEventListener('click', () => {
            errorDisplay.innerText = ''; // Reset error
            scanResult.innerText = "Scanning...";

            // Initialize the scanner on the 'reader' div
            if (!html5QrCode) {
                html5QrCode = new Html5Qrcode("reader");
            }

            // Try to start the back camera (environment)
            html5QrCode.start(
                { facingMode: "environment" },
                {
                    fps: 12,
                    qrbox: { width: 320, height: 140 },
                    formatsToSupport: [
                        Html5QrcodeSupportedFormats.EAN_13,
                        Html5QrcodeSupportedFormats.EAN_8,
                        Html5QrcodeSupportedFormats.UPC_A,
                        Html5QrcodeSupportedFormats.UPC_E,
                        Html5QrcodeSupportedFormats.CODE_128,
                        Html5QrcodeSupportedFormats.CODE_39,
                        Html5QrcodeSupportedFormats.ITF,
                        Html5QrcodeSupportedFormats.CODABAR
                    ]
                },
                // Success callback
                (decodedText, decodedResult) => {
                    handleDetectedCode(decodedText);
                },
                // Error callback (ignoring as it fires continuously when no code is found)
                (errorMessage) => {
                    // console.log("Scanning...", errorMessage);
                }
            ).catch((err) => {
                console.error("Camera start failed:", err);
                errorDisplay.innerText = "Failed to start camera: " + err;
            }).then(() => {
                startNativeAssist(handleDetectedCode);
            });
        });

        stopBtn.addEventListener('click', () => {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    scanResult.innerText = "Stopped.";
                    html5QrCode.clear();
                    html5QrCode = null;
                    stopNativeAssist();
                }).catch((err) => {
                    console.error("Failed to stop camera:", err);
                });
            }
        });
    </script>
</body>

</html>
