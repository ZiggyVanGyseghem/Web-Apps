<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hybrid ISBN Scanner</title>
    <!-- We use html5-qrcode as the base for camera management and fallback decoding -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        :root { --primary: #8a2be2; --bg: #121212; --text: #ffffff; }
        body { margin: 0; padding: 20px; font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); text-align: center; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 12px; max-width: 500px; margin: 0 auto; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .btn { padding: 12px 24px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin: 5px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-stop { background: #333; color: white; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        #reader { width: 100%; border-radius: 8px; overflow: hidden; margin-top: 20px; border: 2px solid #333; }
        .result-box { margin-top: 20px; padding: 15px; border-radius: 8px; background: #2a2a2a; }
        .isbn-text { font-family: monospace; font-size: 24px; color: #4cc9f0; font-weight: bold; margin: 10px 0; display: block; }
        .badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; margin-bottom: 10px; }
        .badge-native { background: #00b894; color: black; }
        .badge-js { background: #fdcb6e; color: black; }
        .warning { background: #ff7675; color: black; padding: 10px; border-radius: 8px; font-size: 14px; margin-bottom: 15px; font-weight: bold; display: none; }
    </style>
</head>

<body>
    <div class="card">
        <h2>📚 ISBN Scanner</h2>
        <div id="httpsWarning" class="warning">
            Camera blocked! Make sure you are using HTTPS or localhost.
        </div>

        <div>
            <button id="startBtn" class="btn btn-primary">Start Scanner</button>
            <button id="stopBtn" class="btn btn-stop" disabled>Stop</button>
        </div>

        <!-- The camera feed injects here -->
        <div id="reader"></div>

        <div class="result-box">
            <div id="detectorBadge"></div>
            <span style="color: #aaa; font-size: 14px;">Last Scanned:</span>
            <span id="scanResult" class="isbn-text">Waiting...</span>
        </div>
    </div>

    <script>
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const scanResult = document.getElementById('scanResult');
        const detectorBadge = document.getElementById('detectorBadge');
        const httpsWarning = document.getElementById('httpsWarning');

        let html5QrCode = null;
        let nativeDetector = null;
        let nativeInterval = null;
        let lastScanned = null;

        // --- 1. CORE LOGIC: ISBN VALIDATION ---
        function cleanBarcode(input) {
            return String(input || '').replace(/\D/g, ''); // Keep only numbers
        }

        function isValidISBN13(code) {
            if (!/^97[89]\d{10}$/.test(code)) return false; // Must start with 978 or 979
            let sum = 0;
            for (let i = 0; i < 12; i++) {
                let digit = parseInt(code[i], 10);
                sum += (i % 2 === 0) ? digit : digit * 3;
            }
            let checkDigit = (10 - (sum % 10)) % 10;
            return checkDigit === parseInt(code[12], 10);
        }

        function handleSuccess(decodedText, engine) {
            const isbn = cleanBarcode(decodedText);
            if (!isValidISBN13(isbn)) return; // Ignore non-book barcodes

            if (isbn === lastScanned) return; // Prevent spamming
            lastScanned = isbn;

            // UI Feedback
            scanResult.innerText = isbn;
            scanResult.style.color = "#00cec9";
            
            // Beep and vibrate
            if (navigator.vibrate) navigator.vibrate(100);
            
            // Reset color after a moment
            setTimeout(() => { scanResult.style.color = "#4cc9f0"; }, 500);

            console.log(`[${engine}] Found ISBN: ${isbn}`);
        }

        // --- 2. NATIVE HARDWARE SCANNER (Android Chrome only) ---
        async function setupNativeScanner() {
            if ('BarcodeDetector' in window) {
                try {
                    nativeDetector = new BarcodeDetector({ formats: ['ean_13'] });
                    detectorBadge.innerHTML = '<span class="badge badge-native">⚡ Hardware Acceleration Active</span>';
                    
                    nativeInterval = setInterval(async () => {
                        const videoElement = document.querySelector('#reader video');
                        if (!videoElement || videoElement.readyState !== 4) return;

                        try {
                            const barcodes = await nativeDetector.detect(videoElement);
                            if (barcodes.length > 0) {
                                handleSuccess(barcodes[0].rawValue, 'Native');
                            }
                        } catch (err) { /* Ignore dropped frames */ }
                    }, 400); // Check 2.5 times a second
                } catch (e) {
                    detectorBadge.innerHTML = '<span class="badge badge-js">JS Fallback Active</span>';
                }
            } else {
                detectorBadge.innerHTML = '<span class="badge badge-js">JS Fallback Active (Safari/iOS)</span>';
            }
        }

        function stopNativeScanner() {
            if (nativeInterval) {
                clearInterval(nativeInterval);
                nativeInterval = null;
            }
        }

        // --- 3. CAMERA LIFECYCLE ---
        startBtn.addEventListener('click', async () => {
            // Check for Secure Context
            if (window.isSecureContext === false) {
                httpsWarning.style.display = "block";
                return;
            }

            startBtn.disabled = true;
            stopBtn.disabled = false;
            scanResult.innerText = "Scanning...";
            lastScanned = null;

            if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");

            const config = {
                fps: 10,
                // Responsive scanning box (80% of width, fixed height)
                qrbox: (viewfinderWidth, viewfinderHeight) => {
                    return { width: viewfinderWidth * 0.8, height: 150 };
                },
                aspectRatio: 1.0, // Force a square container for better mobile layout
                formatsToSupport: [Html5QrcodeSupportedFormats.EAN_13]
            };

            try {
                // Force rear camera
                await html5QrCode.start({ facingMode: "environment" }, config, 
                    (text) => handleSuccess(text, 'JS-Fallback'), 
                    (err) => { /* Ignore JS read failures, happens every frame it doesn't see a code */ }
                );
                
                // Once camera is live, start the hardware scanner overlay
                setupNativeScanner();

            } catch (err) {
                console.error("Camera failed:", err);
                httpsWarning.innerText = "Camera Error: " + err;
                httpsWarning.style.display = "block";
                startBtn.disabled = false;
                stopBtn.disabled = true;
            }
        });

        stopBtn.addEventListener('click', async () => {
            if (html5QrCode) {
                try {
                    await html5QrCode.stop();
                    stopNativeScanner();
                    scanResult.innerText = "Stopped.";
                    startBtn.disabled = false;
                    stopBtn.disabled = true;
                } catch (err) {
                    console.error(err);
                }
            }
        });
    </script>
</body>
</html>
