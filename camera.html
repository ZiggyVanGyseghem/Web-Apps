<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Tracker | Camera Scanner</title>
    <meta name="description" content="Scan barcodes to add items to your watchlist.">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
</head>

<body>
    <header class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-play"></i>
                <span>AnimeTrack</span>
            </a>
            <nav class="main-nav">
                <a href="index.html"><i class="fas fa-home"></i> <span>Home</span></a>
                <a href="#"><i class="fas fa-list"></i> <span>My Watchlist</span></a>
                <a href="camera.html" class="active"><i class="fas fa-camera"></i> <span>Scanner</span></a>
                <a href="#"><i class="fas fa-compass"></i> <span>Browse</span></a>
                <a href="#"><i class="fas fa-user"></i> <span>Profile</span></a>
            </nav>
            <button class="menu-toggle" aria-label="Toggle menu">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </header>

    <main class="container main-content" style="padding-top: 2rem;">
        <section class="hero" style="margin-top: 1rem; padding: 2rem 1rem;">
            <h2><i class="fa-solid fa-barcode highlight"></i> Barcode Scanner</h2>
            <p>Scan a manga or novel's ISBN barcode to automatically fetch details.</p>
            
            <div style="margin: 1.5rem 0;">
                <button class="btn btn-primary" id="startButton">Start Camera</button>
                <button class="btn" id="stopButton" style="background: rgba(255,255,255,0.1); margin-left: 10px;">Stop</button>
            </div>
            
            <div id="errorMessage" style="color: #ff4d4d; margin-top: 10px; font-weight: 600;"></div>
            
            <div style="background: rgba(138, 43, 226, 0.1); padding: 1rem; border-radius: 8px; border: 1px solid rgba(138, 43, 226, 0.3); margin: 1.5rem auto; max-width: 600px;">
                <strong>Scanned ISBN:</strong> <span id="scanResult" style="color: #4cc9f0; font-family: monospace; font-size: 1.2rem; font-weight: bold; margin-left: 10px;">Waiting...</span>
            </div>

            <div id="reader" style="width: 100%; max-width: 600px; margin: 0 auto; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5);"></div>
        </section>
    </main>

    <script>
        const startBtn = document.getElementById('startButton');
        const stopBtn = document.getElementById('stopButton');
        const errorDisplay = document.getElementById('errorMessage');
        const scanResult = document.getElementById('scanResult');
        
        let html5QrCode = null;

        startBtn.addEventListener('click', () => {
            errorDisplay.innerText = ''; 
            scanResult.innerText = "Scanning...";
            
            if (!html5QrCode) {
                html5QrCode = new Html5Qrcode("reader");
            }
            
            html5QrCode.start(
                { facingMode: "environment" },
                {
                    fps: 10,
                    qrbox: { width: 250, height: 100 },
                    formatsToSupport: [ 
                        Html5QrcodeSupportedFormats.EAN_13, 
                        Html5QrcodeSupportedFormats.EAN_8, 
                        Html5QrcodeSupportedFormats.UPC_A, 
                        Html5QrcodeSupportedFormats.UPC_E,
                        Html5QrcodeSupportedFormats.QR_CODE 
                    ]
                },
                (decodedText, decodedResult) => {
                    scanResult.innerText = decodedText;
                    if ("vibrate" in navigator) navigator.vibrate(50);
                },
                (errorMessage) => {
                    // Ignore background errors while scanning
                }
            ).catch((err) => {
                console.error("Camera start failed:", err);
                errorDisplay.innerText = "Failed to start camera: " + err;
            });
        });

        stopBtn.addEventListener('click', () => {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    scanResult.innerText = "Stopped.";
                    html5QrCode.clear();
                    html5QrCode = null;
                }).catch((err) => {
                    console.error("Failed to stop camera:", err);
                });
            }
        });
    </script>
</body>

</html>
